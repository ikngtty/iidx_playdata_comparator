<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="upload_playdata.css">
    <script type="module" src="upload_playdata.js"></script>
  </head>

  <body>
    <h1>IIDXプレーデータのアップロード</h1>
    <p id="textLoginStatus"></p>
    <button id="buttonLogin">Xでログイン</button>
    <button id="buttonLogout">ログアウト</button>

    <div id="areaMain">
      <form id="formProfile">
        <fieldset id="fieldsetProfile" disabled>
          表示名: <input type="text" name="userName"><br>
          DJ NAME: <input type="text" name="djName"><br>
          IIDX ID (数字のみ8桁): <input type="text" name="iidxId"><br>
          プレーデータCSV: <textarea name="playdata"></textarea><br>
          <input type="submit" value="更新">
        </fieldset>
      </form>
    </div>

    <div id="areaConsent">
      <h2>利用規約への同意</h2>
      <p>
        <a href="../terms/" target="_blank">利用規約</a>
        と
        <a href="../privacy/" target="_blank">プライバシーポリシー</a>
        に同意してください。
      </p>
      <label>
        <input type="checkbox" id="checkAgree">
        同意します。
      </label>
      <br>
      <button id="buttonAgree" disabled>続行</button>
    </div>
  </body>
</html>

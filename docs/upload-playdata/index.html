<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../shared/common.css">
    <link rel="stylesheet" href="upload_playdata.css">
    <script type="module" src="upload_playdata.js"></script>
  </head>

  <body>
    <a href="../">戻る</a>

    <h1>IIDXプレーデータのアップロード</h1>
    <p id="textLoginStatus"></p>
    <button id="buttonLogin">Xでログイン</button>
    <button id="buttonLogout">ログアウト</button>

    <div id="areaMain">
      <form id="formProfile">
        <h2>プロフィール</h2>
        <fieldset id="fieldsetProfile" disabled>
          表示名<span class="requiredMark">*</span>: <input type="text" name="userName" id="profileTextUserName">
          <span id="profileWarningCaptionUserName" class="warningCaption"></span><br>
          DJ NAME: <input type="text" name="djName" id="profileTextDjName">
          <span id="profileWarningCaptionDjName" class="warningCaption"></span><br>
          IIDX ID (数字のみ8桁): <input type="text" name="iidxId" id="profileTextIidxId" inputmode="numeric">
          <span id="profileWarningCaptionIidxId" class="warningCaption"></span><br>
          <input id="submitProfile" type="submit" value="登録">
          <button id="buttonDeleteProfile">削除</button>
        </fieldset>
      </form>

      <form id="formPlaydataSp">
        <h2>プレーデータCSV（SP）</h2>
        <fieldset id="fieldsetPlaydataSp" disabled>
          最終アップロード日時：<span id="spanPlaydataSpUploadedAt"></span><br>
          <button id="buttonDeletePlaydataSp">削除</button><br>
          <br>
          <textarea name="playdataSp" id="textPlaydataSp"></textarea>
          <span id="warningCaptionPlaydataSp" class="warningCaption"></span><br>
          <input id="submitPlaydataSp" type="submit" value="アップロード">
        </fieldset>
      </form>

      <form id="formPlaydataDp">
        <h2>プレーデータCSV（DP）</h2>
        <fieldset id="fieldsetPlaydataDp" disabled>
          最終アップロード日時：<span id="spanPlaydataDpUploadedAt"></span><br>
          <button id="buttonDeletePlaydataDp">削除</button><br>
          <br>
          <textarea name="playdataDp" id="textPlaydataDp"></textarea>
          <span id="warningCaptionPlaydataDp" class="warningCaption"></span><br>
          <input id="submitPlaydataDp" type="submit" value="アップロード">
        </fieldset>
      </form>
    </div>

    <div id="areaConsent">
      <h2>利用規約への同意</h2>
      <p>
        <a href="../terms/" target="_blank">利用規約</a>
        と
        <a href="../privacy/" target="_blank">プライバシーポリシー</a>
        に同意してください。
      </p>
      <label>
        <input type="checkbox" id="checkAgree">
        同意します。
      </label>
      <br>
      <button id="buttonAgree" disabled>続行</button>
    </div>
  </body>
</html>

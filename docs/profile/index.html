<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <script type="module" src="profile.js"></script>
  </head>

  <body>
    <h1>プロフィール入力</h1>
    <p id="textLoginStatus"></p>
    <button id="buttonLogin">Xでログイン</button>
    <button id="buttonLogout">ログアウト</button>

    <form id="formProfile">
      <fieldset id="fieldsetProfile" disabled>
        表示名: <input type="text" name="userName"><br>
        DJ NAME: <input type="text" name="djName"><br>
        IIDX ID (数字のみ8桁): <input type="text" name="iidxId"><br>
        CSV: <textarea name="csv"></textarea><br>
        <input type="submit" value="更新">
      </fieldset>
    </form>
  </body>
</html>

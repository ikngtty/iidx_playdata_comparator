<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../shared/common.css">
    <link rel="stylesheet" href="compare_playdata.css">
    <script type="module" src="compare_playdata.js"></script>
  </head>

  <body>
    <a href="../">戻る</a>

    <h1>IIDXプレーデータ比較</h1>

    ※<a href="../search-user/">プレイヤー検索</a>からプレーデータを貼り付けることができます。<br>
    <br>

    Player1:
    <textarea id="inputCsv1"></textarea>
    <span id="warningCaptionCsv1" class="warningCaption"></span><br>
    Player2:
    <textarea id="inputCsv2"></textarea>
    <span id="warningCaptionCsv2" class="warningCaption"></span><br>
    <br>

    並び替え順:
    <select id="selectSortBy">
      <option value="version" selected>バージョン</option>
      <option value="scoreDiff">スコア差</option>
    </select><br>
    <br>

    <button id="buttonCompare">比較</button><br>
    <br>

    <table id="tableComparison">
      <thead>
        <th>バージョン</th>
        <th class="song-title">曲名</th>
        <th>難易度</th>
        <th>レベル</th>
        <th class="clear-type">ランプ1</th>
        <th class="clear-type">ランプ2</th>
        <th>ミスカウント1</th>
        <th>ミスカウント2</th>
        <th>DJレベル1</th>
        <th>DJレベル2</th>
        <th>スコア1</th>
        <th>スコア2</th>
        <th>スコア差</th>
      </thead>
      <tbody></tbody>
    </table>
  </body>
</html>

<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../shared/common.css">
    <link rel="stylesheet" href="compare_playdata.css">
    <script type="module" src="compare_playdata.js"></script>
  </head>

  <body>
    <a href="../">戻る</a>

    <h1>IIDXプレーデータ比較</h1>

    <fieldset>
      <h2>プレーデータCSV</h2>
      ※<a href="../search-user/">プレイヤー検索</a>からプレーデータを貼り付けることができます。<br>
      <br>
      Player1:
      <textarea id="inputCsv1"></textarea>
      <span id="warningCaptionCsv1" class="warningCaption"></span><br>
      Player2:
      <textarea id="inputCsv2"></textarea>
      <span id="warningCaptionCsv2" class="warningCaption"></span><br>
    </fieldset>

    <fieldset>
      <h2>絞り込み条件</h2>

      <!-- TODO: 全てチェック機能 -->
      譜面種別:
      <label><input type="checkbox" name="difficulty" value="BEGINNER" checked>BEGINNER</label>
      <label><input type="checkbox" name="difficulty" value="NORMAL" checked>NORMAL</label>
      <label><input type="checkbox" name="difficulty" value="HYPER" checked>HYPER</label>
      <label><input type="checkbox" name="difficulty" value="ANOTHER" checked>ANOTHER</label>
      <label><input type="checkbox" name="difficulty" value="LEGGENDARIA" checked>LEGGENDARIA</label>
      <br>

      レベル:
      <select id="selectFilterLevel">
        <option value="all" selected>全て</option>
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4">4</option>
        <option value="5">5</option>
        <option value="6">6</option>
        <option value="7">7</option>
        <option value="8">8</option>
        <option value="9">9</option>
        <option value="10">10</option>
        <option value="11">11</option>
        <option value="12">12</option>
      </select>
    </fieldset>

    並び替え順:
    <select id="selectSortBy">
      <option value="version" selected>バージョン</option>
      <option value="levelAsc">レベル（昇順）</option>
      <option value="levelDesc">レベル（降順）</option>
      <option value="scoreDiff">スコア差</option>
      <option value="clearDiff">クリア差</option>
      <option value="player1MissCount">ミスカウント1</option>
      <option value="player2MissCount">ミスカウント2</option>
    </select><br>
    <br>

    <button id="buttonCompare">比較</button><br>
    <br>

    <table id="tableComparison">
      <thead>
        <th>バージョン</th>
        <th class="song-title">曲名</th>
        <th>難易度</th>
        <th>レベル</th>
        <th class="clear-type">ランプ1</th>
        <th class="clear-type">ランプ2</th>
        <th>ミスカウント1</th>
        <th>ミスカウント2</th>
        <th>DJレベル1</th>
        <th>DJレベル2</th>
        <th>スコア1</th>
        <th>スコア2</th>
        <th>スコア差</th>
      </thead>
      <tbody></tbody>
    </table>
  </body>
</html>

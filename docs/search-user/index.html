<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../shared/common.css">
    <script type="module" src="search_user.js"></script>
  </head>

  <body>
    <a href="../">戻る</a>

    <h1>プレイヤー検索</h1>

    <fieldset>
      <label>
        <input type="radio" name="filterChoice" value="displayName" checked>
        表示名で絞り込み
      </label>
      <input type="text" id="inputDisplayName">
      <span id="warningCaptionDisplayName" class="warningCaption"></span>
      <br>

      <label>
        <input type="radio" name="filterChoice" value="iidxId">
        IIDX IDで絞り込み
      </label>
      <input type="text" id="inputIidxId" disabled>
      <span id="warningCaptionIidxId" class="warningCaption"></span>
      <br>
    </fieldset>

    <button id="buttonSearch">検索</button><br>
    <br>

    <table id="tableUsers">
      <thead>
        <th>名前</th>
        <th>DJ NAME</th>
        <th>IIDX ID</th>
        <th>最終アップロード日時（SP・DP）</th>
        <th>比較データにセット</th>
      </thead>
      <tbody></tbody>
    </table>
    <br>

    <button id="buttonSearchNext" disabled>続きを読み込む</button>
  </body>
</html>
